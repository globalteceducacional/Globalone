# Repassa variaveis do .env (Docker) para o PHP via Apache.
PassEnv MOODLE_DB_HOST
PassEnv MOODLE_DB_NAME
PassEnv MOODLE_DB_USER
PassEnv MOODLE_DB_PASSWORD
PassEnv MOODLE_WWWROOT
PassEnv MOODLE_DATAROOT

# Bloqueia caminhos internos (relatorio Seguranca > Verificar caminhos publicos/privados).
# Regras oficiais Moodle 5: https://docs.moodle.org/500/en/Apache
<Directory /var/www/html>
    AllowOverride All
    RewriteEngine On
    RewriteRule "(/vendor/)" - [L,R=404]
    RewriteRule "(/node_modules/)" - [L,R=404]
    RewriteRule "(^|/)\.(?!well-known/)" - [L,R=404]
    RewriteRule "(composer\.json)" - [L,R=404]
    RewriteRule "(\.lock)" - [L,R=404]
    RewriteRule "(/environment\.xml)" - [L,R=404]
    RewriteRule "(/lib/classes)" - [L,R=404]
    RewriteRule "(/install\.xml)" - [L,R=404]
    RewriteRule "(/README)" - [L,R=404]
    RewriteRule "(/readme)" - [L,R=404]
    RewriteRule "(/moodle_readme)" - [L,R=404]
    RewriteRule "(/upgrade\.txt)" - [L,R=404]
    RewriteRule "(phpunit\.xml\.dist)" - [L,R=404]
    RewriteRule "(/tests/behat/)" - [L,R=404]
    RewriteRule "(/fixtures/)" - [L,R=404]
    RewriteRule "(/upgrade\.txt|UPGRADING\.md|UPGRADING-CURRENT\.md)" - [L,R=404]
</Directory>
