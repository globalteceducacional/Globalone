; Limites para upload de videos no Moodle
upload_max_filesize = 512M
post_max_size = 512M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M

; Producao: nao exibir erros PHP no navegador (relatorio de seguranca Moodle)
display_errors = Off
display_startup_errors = Off
log_errors = On
expose_php = Off
