# Nginx — ERP na VPS (HTTPS + Certbot)
#
# ANTES de sudo cp: confira o nome real do certificado:
#   sudo certbot certificates
# O "Certificate Name" deve bater com ssl_certificate abaixo (pasta em /etc/letsencrypt/live/).
# Se nginx -t falhar após copiar, NÃO dê reload — restaure o backup:
#   sudo cp /etc/nginx/sites-available/erp.bak /etc/nginx/sites-available/erp
#
# Serviços no host:
#   5174 = frontend  ·  3001 = backend Nest
#
# Upload: até 2 GB por arquivo (modelos 3D, vídeos, planilhas grandes).
# Backend espelha UPLOAD_MAX_MB=2048 — Nginx usa 2100M (margem pequena).
#
# Importante: /uploads/ e /uploads-protegido/ DEVEM ir para o backend (3001).
# Se caírem no location / → 5174, o Nginx do front devolve 404 para esse path.

server {
    server_name erp.alenxandriaglobaltec.com;

    server_tokens off;

    # Headers de segurança (cada add_header em UMA linha)
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    # Ponto (RH): geolocalização e câmera (selfie) no mesmo domínio; microfone continua bloqueado.
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # CSP: viewers de documento (PDF, DOCX, XLSX, modelos 3D) precisam de blob: e data:
    # para criar URLs temporárias e renderizar estilos inline.
    # frame-src blob: necessário para o viewer de PDF (renderiza em <iframe blob:>).
    # worker-src blob: necessário para PDF.js (worker embutido via blob URL no app).
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' data:; connect-src 'self' blob: data: https://nominatim.openstreetmap.org; frame-src 'self' blob: data:; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'self' blob: data:;" always;

    location / {
        proxy_pass http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        client_max_body_size 2100M;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location ^~ /uploads/ {
        client_max_body_size 2100M;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /uploads-protegido/ {
        client_max_body_size 2100M;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/erp.alenxandriaglobaltec.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/erp.alenxandriaglobaltec.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name erp.alenxandriaglobaltec.com;
    return 301 https://$host$request_uri;
}
