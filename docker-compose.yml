name: gone-suite

services:
  gateway:
    image: caddy:2.8-alpine
    container_name: gone-gateway
    restart: unless-stopped
    depends_on:
      - gone
    ports:
      - "80:80"
      - "443:443"
    environment:
      GONE_DOMAIN: ${GONE_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - suite-net

  gone:
    image: nginx:1.27-alpine
    container_name: gone-portal
    restart: unless-stopped
    volumes:
      - ./apps/gone:/usr/share/nginx/html:ro
      - ./apps/gone_nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - suite-net

networks:
  suite-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
